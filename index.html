<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:linear-gradient(180deg,#f8f1e7,#6b1f2a);
    color:#f8f1e7;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero{
    background:linear-gradient(to bottom,#f8f1e7,#6b1f2a);
    color:white;
}

h1{
    font-size:3rem;
    margin:0;
    letter-spacing:3px;
}

h2{
    font-size:2.2rem;
}

.btn{
    padding:14px 28px;
    background:#8b2332;
    color:white;
    text-decoration:none;
    border-radius:30px;
    border:2px solid #f8f1e7;
}

.countdown{
    font-size:1.5rem;
    font-weight:bold;
}

.fade{
    animation:fadeIn 2s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.petal{
    position:fixed;
    top:-20px;
    font-size:18px;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

.music{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#8b2332;
    color:#fff;
    padding:12px 18px;
    border-radius:25px;
}
</style>
