<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spandana & Karthik Wedding Invitation</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:linear-gradient(180deg,#f8f1e7,#d9b8b8,#6b1f2a);
color:white;
overflow-x:hidden;
text-align:center;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.hero{
background:linear-gradient(to bottom,#f8f1e7,#6b1f2a);
}

.btn{
padding:14px 28px;
background:#8b2332;
color:white;
text-decoration:none;
border-radius:30px;
border:2px solid #f8f1e7;
}

.petal{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

.music{
position:fixed;
bottom:20px;
right:20px;
background:#8b2332;
padding:10px 15px;
border-radius:25px;
}
</style>
</head>

<body>

<button class="music" onclick="playMusic()">
🎵 Play Music
</button>

<audio id="bgMusic" loop>
  <source src="sakhi.mp3" type="audio/mpeg">
</audio>

<section class="hero">
<h2>A Journey of Love, Laughter & Forever</h2>
<p>Together with their families</p>
<a href="#invite" class="btn">Open Invitation</a>
</section>

<section id="invite">
<h1>SPANDANA</h1>
<h2>&</h2>
<h1>KARTHIK</h1>
<p>Joyfully invite you to celebrate the beginning of their forever.</p>

<p>📅 27 June 2026</p>
<p>⏰ 08:18 AM</p>
<p>📍 Kothapeta, Avanigadda</p>

<h2 id="timer"></h2>
</section>

<script>
const target=new Date("June 27, 2026 08:18:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let d=target-now;

let days=Math.floor(d/(1000*60*60*24));
let hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let mins=Math.floor((d%(1000*60*60))/(1000*60));
let secs=Math.floor((d%(1000*60))/1000);

document.getElementById("timer").innerHTML=
days+" Days "+hrs+" Hours "+mins+" Minutes "+secs+" Seconds";
},1000);

for(let i=0;i<35;i++){
let p=document.createElement("div");
p.className="petal";
p.innerHTML='❀';
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(6+Math.random()*8)+"s";
document.body.appendChild(p);
}
  function playMusic(){
  document.getElementById("bgMusic").play();
  }
</script>

</body>
</html>
<body>

  <!-- your wedding content -->

  <audio autoplay loop>
    <source src="sakhi.mp3" type="audio/mpeg">
  </audio>

</body>
